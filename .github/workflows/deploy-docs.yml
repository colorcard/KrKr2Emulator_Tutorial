name: 部署文档站点

on:
  push:
    branches:
      - main
    paths:
      - '**.md'
      - 'mkdocs.yml'
      - 'scripts/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装 MkDocs
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material

      - name: 生成临时站点源文件
        run: python scripts/prepare_mkdocs.py

      - name: 构建站点
        run: mkdocs build

      - name: 上传 Pages 构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: .mkdocs-site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
