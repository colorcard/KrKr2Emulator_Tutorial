name: 部署文档站点

on:
  push:
    branches:
      - main
    paths:
      - '**.md'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 生成临时站点源文件
        run: npm run docs:prepare

      - name: 构建站点
        run: npm run docs:build
        env:
          VITEPRESS_BASE: /${{ github.event.repository.name }}/

      - name: 上传 Pages 构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: .mkdocs-src/.vitepress/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
